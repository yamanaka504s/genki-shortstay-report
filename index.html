<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>元気の家ショートステイ 報告書作成</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700;900&family=Sawarabi+Mincho&family=Kosugi+Maru&family=Mochiy+Pop+One&family=Klee+One:wght@600&family=Zen+Kurenaido&display=swap" rel="stylesheet">
<script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.13/dist/face-api.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Yu Gothic UI", "Meiryo", sans-serif; background: #eef1f5; color: #333; }

  /* ===== レイアウト ===== */
  .app { display: grid; grid-template-columns: 320px 1fr; min-height: 100vh; }
  .panel { background: #fff; border-right: 1px solid #ddd; padding: 16px; overflow-y: auto; max-height: 100vh; }
  .stage { padding: 24px; display: flex; justify-content: center; align-items: flex-start; }

  /* ===== サイドパネル ===== */
  h1 { font-size: 16px; margin-bottom: 12px; color: #2a5d8f; }
  h2 { font-size: 13px; margin: 14px 0 6px; color: #555; border-left: 4px solid #2a5d8f; padding-left: 6px; }
  .group { margin-bottom: 14px; }
  button, .btn {
    background: #2a5d8f; color: #fff; border: none; padding: 8px 12px;
    border-radius: 6px; cursor: pointer; font-size: 12px; margin: 2px;
    transition: background .15s;
  }
  button:hover { background: #3b7ab8; }
  button.sub { background: #ddd; color: #333; }
  button.sub:hover { background: #ccc; }
  button.warn { background: #c0392b; }
  .chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .chip { padding: 6px 10px; background: #f0f3f7; border: 1px solid #d0d7e0; border-radius: 14px; cursor: pointer; font-size: 12px; }
  .chip.active { background: #2a5d8f; color: #fff; border-color: #2a5d8f; }
  textarea, input[type="text"] {
    width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px;
    font-family: inherit; font-size: 12px; resize: vertical;
  }
  textarea { min-height: 60px; }
  label { font-size: 11px; color: #666; display: block; margin-bottom: 2px; }
  .file-input { display: none; }
  .file-label {
    display: inline-block; background: #27ae60; color: #fff;
    padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  .file-label:hover { background: #2ecc71; }
  .hint { font-size: 11px; color: #888; margin-top: 4px; }

  /* ===== A4用紙 ===== */
  .page {
    width: 210mm; min-height: 297mm; background: #fff;
    box-shadow: 0 4px 18px rgba(0,0,0,.15);
    padding: 12mm; position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 8px; margin-bottom: 10px; }
  .title-area .main-title { font-size: 22px; font-weight: bold; }
  .title-area .sub-title { font-size: 12px; opacity: .7; }
  .meta { text-align: right; font-size: 11px; line-height: 1.7; }

  /* ===== 写真エリア ===== */
  .photo-area { flex: 1.2; display: grid; gap: 6px; position: relative; min-height: 130mm; }
  .photo-cell {
    position: relative; overflow: hidden; background: #f5f5f5;
    border-radius: 4px; display: flex; align-items: center; justify-content: center;
  }
  .photo-cell img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-cell .placeholder { color: #aaa; font-size: 14px; text-align: center; padding: 16px; }

  /* ===== レイアウト（シンプルな3種） ===== */
  /* 四角パターン（グリッド） */
  .photo-area[data-count="3"].pat-square { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr; gap: 8px; }
  .photo-area[data-count="4"].pat-square { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; }

  /* 円パターン（各セルを真円に） */
  .photo-area[data-count="3"].pat-circle { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr; gap: 10px; align-items: center; }
  .photo-area[data-count="4"].pat-circle { grid-template-columns: 1fr 1fr 1fr 1fr; grid-template-rows: 1fr; gap: 10px; align-items: center; }
  .pat-circle .photo-cell { aspect-ratio: 1 / 1; border-radius: 50% !important; box-shadow: 0 6px 18px rgba(0,0,0,.15); border: 4px solid #fff; }
  .pat-circle .photo-cell img { border-radius: 50%; }

  /* 大小メリハリパターン */
  .photo-area[data-count="3"].pat-contrast { grid-template-columns: 2fr 1fr; grid-template-rows: 1fr 1fr; gap: 8px; }
  .photo-area[data-count="3"].pat-contrast .photo-cell:nth-child(1) { grid-row: span 2; }
  .photo-area[data-count="4"].pat-contrast { grid-template-columns: 2.2fr 1fr; grid-template-rows: 1fr 1fr 1fr; gap: 8px; }
  .photo-area[data-count="4"].pat-contrast .photo-cell:nth-child(1) { grid-row: span 3; }

  /* ===== 背景スキン（テーマに重ねる装飾） ===== */
  .skin-dots { background-image: radial-gradient(rgba(0,0,0,.06) 1.5px, transparent 1.5px); background-size: 14px 14px; }
  .skin-grid { background-image: linear-gradient(rgba(0,0,0,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,.04) 1px, transparent 1px); background-size: 20px 20px; }
  .skin-diag { background-image: repeating-linear-gradient(45deg, rgba(0,0,0,.025) 0 8px, transparent 8px 16px); }
  .skin-wave::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: 0; height: 35mm;
    background: radial-gradient(ellipse at top, transparent 60%, rgba(0,0,0,.04) 100%);
    pointer-events: none; z-index: 0;
  }
  .skin-corners::before, .skin-corners::after {
    content: ''; position: absolute; width: 60mm; height: 60mm; pointer-events: none; z-index: 0;
  }
  .skin-corners::before { top: 0; left: 0; background: radial-gradient(circle at top left, currentColor, transparent 70%); opacity: .12; }
  .skin-corners::after { bottom: 0; right: 0; background: radial-gradient(circle at bottom right, currentColor, transparent 70%); opacity: .12; }
  .skin-stripes { background-image: repeating-linear-gradient(0deg, transparent 0 30px, rgba(0,0,0,.03) 30px 32px); }
  .skin-confetti::before {
    content: '✿ ❀ ✦ ❁ ✿ ❀'; position: absolute; top: 4mm; left: 4mm; right: 30mm;
    font-size: 14px; opacity: .15; letter-spacing: 18px; pointer-events: none;
  }

  .page > .header, .page > .photo-area, .page > .comment-area, .page > .footer { position: relative; z-index: 1; }

  /* タイトル装飾バリエーション */
  .titlevar-1 .main-title { letter-spacing: 0; }
  .titlevar-2 .main-title { letter-spacing: 4px; font-weight: 900; }
  .titlevar-3 .main-title::before { content: '― '; opacity: .6; }
  .titlevar-3 .main-title::after { content: ' ―'; opacity: .6; }
  .titlevar-4 .main-title { font-style: italic; }
  .titlevar-5 .main-title { text-shadow: 2px 2px 0 rgba(0,0,0,.08); }

  /* コメントエリア装飾バリエーション */
  .commvar-rounded { border-radius: 18px !important; }
  .commvar-tag { border-radius: 0 18px 18px 0 !important; }
  .commvar-quote::before { content: '“'; font-size: 30px; opacity: .4; margin-right: 6px; vertical-align: -10px; }
  .commvar-double { border: 2px double currentColor !important; border-left-width: 5px !important; }

  /* ===== 写真の基本仕上げ（パターン共通の微調整） ===== */
  .pat-square .photo-cell { border-radius: 6px; box-shadow: 0 3px 10px rgba(0,0,0,.12); }
  .pat-contrast .photo-cell { border-radius: 6px; box-shadow: 0 3px 10px rgba(0,0,0,.12); }
  .pat-contrast .photo-cell:first-child { border-radius: 10px; box-shadow: 0 6px 18px rgba(0,0,0,.18); }

  /* ===== テロップ（SVGイラスト入り） ===== */
  .telop {
    position: absolute; cursor: move; user-select: none; z-index: 10;
    display: inline-block; transition: transform .1s;
  }
  .telop:hover { transform: scale(1.04) !important; }
  .telop .del {
    position: absolute; top: -10px; right: -10px; background: #e74c3c; color: #fff;
    width: 20px; height: 20px; border-radius: 50%; font-size: 11px; display: none;
    align-items: center; justify-content: center; cursor: pointer; border: 2px solid #fff;
    z-index: 20;
  }
  .telop:hover .del { display: flex; }
  .telop .deco { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
  .telop .deco svg { width: 100%; height: 100%; display: block; overflow: visible; }
  .telop .txt {
    position: relative; z-index: 1; padding: 16px 34px; font-weight: 700;
    font-size: 18px; white-space: nowrap; display: block;
  }

  /* ① 桜リボン（ピンクグラデ・キラメキ） */
  .tel-sakura .txt { color: #fff; font-family: "Noto Serif JP", serif;
    text-shadow: 0 1px 2px rgba(140,30,60,.6); padding: 14px 48px; letter-spacing: 2px; }

  /* ② ゴールドプレート（高級感） */
  .tel-gold .txt { color: #5a3d00; font-family: "Noto Serif JP", serif; font-weight: 900;
    text-shadow: 0 1px 0 rgba(255,255,255,.5); padding: 16px 42px; letter-spacing: 3px; }

  /* ③ コミック吹き出し */
  .tel-comic .txt { color: #111; font-family: "Mochiy Pop One", sans-serif;
    padding: 20px 38px 22px; font-size: 19px; }

  /* ④ 水彩ブラシ */
  .tel-watercolor .txt { color: #fff; font-family: "Klee One", serif; font-weight: 700;
    text-shadow: 0 2px 4px rgba(0,0,0,.25); padding: 18px 38px; letter-spacing: 1px; }

  /* ⑤ ヴィンテージスタンプ */
  .tel-stamp .txt { color: #9c1f1f; font-family: "Noto Serif JP", serif; font-weight: 900;
    padding: 18px 30px; letter-spacing: 4px; transform: rotate(-5deg);
    text-shadow: 0 0 1px #9c1f1f;
  }
  .tel-stamp { transform: rotate(-3deg); }

  /* ⑥ 手書きノート */
  .tel-note .txt { color: #2c3e50; font-family: "Zen Kurenaido", "Klee One", serif;
    padding: 16px 30px; font-size: 18px; font-weight: 600; }

  /* ⑦ ポップステッカー */
  .tel-pop .txt { color: #fff; font-family: "Mochiy Pop One", sans-serif;
    padding: 16px 36px; text-shadow: 2px 2px 0 rgba(0,0,0,.3); letter-spacing: 1px; }

  /* ⑧ 季節フラワー */
  .tel-flower .txt { color: #4a3b2a; font-family: "Sawarabi Mincho", serif; font-weight: 700;
    padding: 18px 52px; letter-spacing: 2px; }

  /* ===== コメント ===== */
  .comment-area {
    margin-top: 8px; padding: 12px 16px; border-radius: 8px;
    font-size: 13px; line-height: 1.7; min-height: 60px;
  }

  /* ===== フッター ===== */
  .footer { margin-top: 8px; padding-top: 6px; font-size: 10px; opacity: .7;
    border-top: 1px dashed #ccc; display: flex; justify-content: space-between; }

  /* ===== テーマ ===== */
  /* 春 */
  .theme-spring { background: linear-gradient(135deg, #fff5f8 0%, #fff 50%); }
  .theme-spring .header { border-bottom: 3px solid #f8a5c2; }
  .theme-spring .title-area .main-title { color: #c2185b; }
  .theme-spring .comment-area { background: #fde8ef; border-left: 5px solid #f06292; color: #6a1b3a; }
  .theme-spring::before { content: '🌸'; position: absolute; top: 4mm; right: 6mm; font-size: 28px; opacity: .4; }

  /* 夏 */
  .theme-summer { background: linear-gradient(135deg, #e3f5fc 0%, #fff 50%); }
  .theme-summer .header { border-bottom: 3px solid #4fc3f7; }
  .theme-summer .title-area .main-title { color: #0277bd; }
  .theme-summer .comment-area { background: #e1f5fe; border-left: 5px solid #29b6f6; color: #01579b; }
  .theme-summer::before { content: '🌻'; position: absolute; top: 4mm; right: 6mm; font-size: 28px; opacity: .5; }

  /* 秋 */
  .theme-autumn { background: linear-gradient(135deg, #fff3e0 0%, #fff 50%); }
  .theme-autumn .header { border-bottom: 3px solid #ff9800; }
  .theme-autumn .title-area .main-title { color: #bf360c; }
  .theme-autumn .comment-area { background: #ffe0b2; border-left: 5px solid #fb8c00; color: #5d2c00; }
  .theme-autumn::before { content: '🍁'; position: absolute; top: 4mm; right: 6mm; font-size: 28px; opacity: .5; }

  /* 冬 */
  .theme-winter { background: linear-gradient(135deg, #eef5fa 0%, #fff 50%); }
  .theme-winter .header { border-bottom: 3px solid #90a4ae; }
  .theme-winter .title-area .main-title { color: #37474f; }
  .theme-winter .comment-area { background: #eceff1; border-left: 5px solid #607d8b; color: #263238; }
  .theme-winter::before { content: '❄️'; position: absolute; top: 4mm; right: 6mm; font-size: 28px; opacity: .5; }

  /* シンプル */
  .theme-simple { background: #fff; }
  .theme-simple .header { border-bottom: 2px solid #333; }
  .theme-simple .title-area .main-title { color: #222; }
  .theme-simple .comment-area { background: #f7f7f7; border-left: 5px solid #555; }

  /* モダン */
  .theme-modern { background: #fafafa; }
  .theme-modern .header { border-bottom: 4px double #444; }
  .theme-modern .title-area .main-title { color: #111; letter-spacing: 2px; }
  .theme-modern .comment-area { background: #fff; border: 2px solid #333; color: #222; }

  /* ぬくもり */
  .theme-warm { background: linear-gradient(135deg, #fdf6ec 0%, #fff 60%); }
  .theme-warm .header { border-bottom: 3px solid #d4a574; }
  .theme-warm .title-area .main-title { color: #8b5a2b; }
  .theme-warm .comment-area { background: #f5e6d3; border-left: 5px solid #c08552; color: #5d3a1a; }
  .theme-warm::before { content: '☕'; position: absolute; top: 4mm; right: 6mm; font-size: 26px; opacity: .4; }

  /* ポップ */
  .theme-pop { background: linear-gradient(135deg, #fff9c4 0%, #fff 40%, #f8bbd0 100%); }
  .theme-pop .header { border-bottom: 4px dashed #ec407a; }
  .theme-pop .title-area .main-title { color: #ad1457; }
  .theme-pop .comment-area { background: #fff; border: 3px dashed #ff80ab; border-radius: 16px; color: #4a148c; }
  .theme-pop::before { content: '🎈'; position: absolute; top: 4mm; right: 6mm; font-size: 28px; }

  /* ===== 印刷 ===== */
  @media print {
    body { background: #fff; }
    .panel { display: none; }
    .app { grid-template-columns: 1fr; }
    .stage { padding: 0; }
    .page { box-shadow: none; width: 210mm; min-height: 297mm; }
    .telop .del { display: none !important; }
    @page { size: A4; margin: 0; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- ====== 操作パネル ====== -->
  <aside class="panel">
    <h1>🏠 ショートステイ報告書</h1>

    <div class="group">
      <h2>① 写真選択（3〜4枚）</h2>
      <label class="file-label">
        📷 写真を選ぶ
        <input type="file" class="file-input" id="photoInput" accept="image/*" multiple>
      </label>
      <div class="hint">最大4枚まで。順序はクリックで入替できます</div>
    </div>

    <div class="group">
      <h2>② 写真パターン</h2>
      <div class="chips" id="patternChips"></div>
      <button onclick="shuffleDesign()" style="width:100%;margin-top:6px;">🎨 デザイン変更（押すたびに変化）</button>
      <div class="hint">四角・円・大小の3パターン／AI顔検出で自動トリミング</div>
    </div>

    <div class="group">
      <h2>③ カラーテーマ</h2>
      <div class="chips" id="themeChips"></div>
    </div>

    <div class="group">
      <h2>④ テロップ追加</h2>
      <input type="text" id="telopText" placeholder="自由入力（空欄ならAIが提案）">
      <div style="margin-top:6px;">
        <button onclick="addTelop()" style="width:100%;">✨ AIテロップを追加（毎回違うパターン）</button>
        <button class="sub" onclick="clearTelops()" style="width:100%;margin-top:4px;">すべてクリア</button>
      </div>
      <div class="hint">押すごとに文言・装飾・配置が変化／ドラッグで移動</div>
    </div>

    <div class="group">
      <h2>⑤ コメント</h2>
      <textarea id="commentText" placeholder="2〜3行のコメントを入力"></textarea>
      <button onclick="generateAI()" style="margin-top:6px;width:100%;">🤖 AIでコメント生成</button>
    </div>

    <div class="group">
      <h2>⑥ 利用日</h2>
      <label>利用開始日</label>
      <input type="date" id="startDate">
      <label style="margin-top:4px;">利用終了日（単日の場合は空欄）</label>
      <input type="date" id="endDate">
    </div>

    <div class="group">
      <h2>⑦ 出力</h2>
      <button onclick="window.print()" style="width:100%;">🖨️ 印刷 / PDF保存</button>
    </div>
  </aside>

  <!-- ====== A4プレビュー ====== -->
  <main class="stage">
    <div class="page theme-spring" id="page">
      <div class="header">
        <div class="title-area">
          <div class="main-title">ショートステイご利用報告</div>
          <div class="sub-title">元気の家ショートステイ</div>
        </div>
        <div class="meta">
          <div>利用日: <span id="metaDate">　　　　</span></div>
        </div>
      </div>

      <div class="photo-area pat-square" data-count="4" id="photoArea"></div>

      <div class="comment-area" id="commentArea">
        ご利用中の様子をこちらに記載します。AIボタンで自動生成も可能です。
      </div>

      <div class="footer">
        <span>元気の家ショートステイ</span>
      </div>
    </div>
  </main>
</div>

<script>
// ===== データ =====
const patterns = [
  { id: 'pat-square',   name: '□ 四角' },
  { id: 'pat-circle',   name: '○ 円' },
  { id: 'pat-contrast', name: '◧ 大小メリハリ' }
];

const themes = [
  { id: 'theme-spring', name: '🌸 春' },
  { id: 'theme-summer', name: '🌻 夏' },
  { id: 'theme-autumn', name: '🍁 秋' },
  { id: 'theme-winter', name: '❄️ 冬' },
  { id: 'theme-simple', name: '⬜ シンプル' },
  { id: 'theme-modern', name: '◼️ モダン' },
  { id: 'theme-warm', name: '☕ ぬくもり' },
  { id: 'theme-pop', name: '🎈 ポップ' }
];

const telopStyles = ['tel-sakura','tel-gold','tel-comic','tel-watercolor','tel-stamp','tel-note','tel-pop','tel-flower'];

// ===== SVGイラスト生成（テロップ背景装飾） =====
function svgDeco(style, season) {
  const s = style;
  if (s === 'tel-sakura') return `
    <svg viewBox="0 0 300 80" preserveAspectRatio="none">
      <defs>
        <linearGradient id="sakgrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#ff8fb3"/>
          <stop offset="1" stop-color="#d43e6f"/>
        </linearGradient>
        <filter id="sakshadow" x="-10%" y="-30%" width="120%" height="160%">
          <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity=".25"/>
        </filter>
      </defs>
      <g filter="url(#sakshadow)">
        <path d="M 0,40 L 22,15 L 278,15 L 300,40 L 278,65 L 22,65 Z" fill="url(#sakgrad)"/>
        <path d="M 22,15 L 0,40 L 22,65 L 30,40 Z" fill="#8a2148"/>
        <path d="M 278,15 L 300,40 L 278,65 L 270,40 Z" fill="#8a2148"/>
        <rect x="22" y="17" width="256" height="5" fill="rgba(255,255,255,.5)"/>
      </g>
      <g fill="#fff" opacity=".9">
        <g transform="translate(35,22)"><circle r="3"/><circle cx="4" cy="4" r="1.5"/><circle cx="-4" cy="4" r="1.5"/></g>
        <g transform="translate(265,58)"><circle r="3"/><circle cx="4" cy="-4" r="1.5"/><circle cx="-4" cy="-4" r="1.5"/></g>
      </g>
    </svg>`;

  if (s === 'tel-gold') return `
    <svg viewBox="0 0 300 80" preserveAspectRatio="none">
      <defs>
        <linearGradient id="ggrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#fff3b0"/>
          <stop offset=".45" stop-color="#e6b94a"/>
          <stop offset=".55" stop-color="#c99530"/>
          <stop offset="1" stop-color="#8a6516"/>
        </linearGradient>
        <filter id="gshadow"><feDropShadow dx="0" dy="3" stdDeviation="2" flood-opacity=".35"/></filter>
      </defs>
      <g filter="url(#gshadow)">
        <rect x="4" y="8" width="292" height="64" rx="4" fill="url(#ggrad)"/>
        <rect x="4" y="8" width="292" height="64" rx="4" fill="none" stroke="#8a6516" stroke-width="1.5"/>
        <rect x="10" y="14" width="280" height="52" rx="2" fill="none" stroke="#fff5c4" stroke-width="1" opacity=".7"/>
      </g>
      <g fill="#5a3d00" opacity=".7">
        <path d="M 16,18 Q 22,14 28,18 Q 22,22 16,18" />
        <path d="M 284,62 Q 278,58 272,62 Q 278,66 284,62" />
        <circle cx="22" cy="62" r="1.5"/><circle cx="278" cy="18" r="1.5"/>
      </g>
    </svg>`;

  if (s === 'tel-comic') return `
    <svg viewBox="0 0 300 100" preserveAspectRatio="none">
      <defs>

const skins = ['', 'skin-dots', 'skin-grid', 'skin-diag', 'skin-wave', 'skin-corners', 'skin-stripes', 'skin-confetti'];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function aiTelopText() {

// ===== 状態 =====
let state = {
  photos: [],       // dataURL
  pattern: 'pat-square',
  theme: 'theme-spring',
  skin: '',
  titleVar: 'titlevar-1',
  commVar: '',
  cellCrops: []     // 顔検出結果 "x% y%"
};

// ===== 顔検出（face-api.js tiny model） =====
let faceApiReady = false;
let faceApiLoading = null;
async function ensureFaceApi() {
  if (faceApiReady) return true;
  if (faceApiLoading) return faceApiLoading;
  faceApiLoading = (async () => {
    try {
      if (typeof faceapi === 'undefined') {
        // script defer でまだ読込中の場合
        await new Promise(r => setTimeout(r, 300));
      }
      const base = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.13/model';
      await faceapi.nets.tinyFaceDetector.loadFromUri(base);
      faceApiReady = true;
      return true;
    } catch (e) {
      console.warn('face-api load failed:', e);
      return false;
    }
  })();
  return faceApiLoading;
}

async function detectCrop(dataUrl) {
  try {
    const ok = await ensureFaceApi();
    if (!ok) return 'center center';
    const img = await new Promise((res, rej) => {
      const i = new Image();
      i.onload = () => res(i);
      i.onerror = rej;
      i.src = dataUrl;
    });
    const dets = await faceapi.detectAllFaces(img,
      new faceapi.TinyFaceDetectorOptions({ inputSize: 416, scoreThreshold: 0.4 }));
    if (!dets || dets.length === 0) return 'center center';
    // 全顔の重心
    let minX = Infinity, minY = Infinity, maxX = 0, maxY = 0;
    dets.forEach(d => {
      const b = d.box;
      minX = Math.min(minX, b.x); minY = Math.min(minY, b.y);
      maxX = Math.max(maxX, b.x + b.width); maxY = Math.max(maxY, b.y + b.height);
    });
    const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
    // 画像内の%に変換（0〜100でクランプ）
    const px = Math.max(0, Math.min(100, (cx / img.width) * 100));
    const py = Math.max(0, Math.min(100, (cy / img.height) * 100));
    return `${px.toFixed(1)}% ${py.toFixed(1)}%`;
  } catch (e) {
    console.warn('detectCrop error:', e);
    return 'center center';
  }
}

// ===== 初期化 =====
function init() {
  // 季節判定
  const month = new Date().getMonth() + 1;
  let defaultTheme = 'theme-spring';
  if (month >= 3 && month <= 5) defaultTheme = 'theme-spring';
  else if (month >= 6 && month <= 8) defaultTheme = 'theme-summer';
  else if (month >= 9 && month <= 11) defaultTheme = 'theme-autumn';
  else defaultTheme = 'theme-winter';
  state.theme = defaultTheme;

  // 日付デフォルト（本日）
  const today = new Date();
  const iso = today.toISOString().slice(0, 10);
  document.getElementById('startDate').value = iso;

  buildChips();
  renderPhotos();
  applyAll();
  bindEvents();
  updateMeta();

  // face-api のモデルをバックグラウンド先読み
  ensureFaceApi();
}

// ===== チップ生成 =====
function buildChips() {
  const pc = document.getElementById('patternChips');
  pc.innerHTML = '';
  patterns.forEach(p => {
    const c = document.createElement('div');
    c.className = 'chip' + (state.pattern === p.id ? ' active' : '');
    c.textContent = p.name;
    c.onclick = () => { state.pattern = p.id; applyAll(); buildChips(); };
    pc.appendChild(c);
  });
  const tc = document.getElementById('themeChips');
  tc.innerHTML = '';
  themes.forEach(t => {
    const c = document.createElement('div');
    c.className = 'chip' + (state.theme === t.id ? ' active' : '');
    c.textContent = t.name;
    c.onclick = () => { state.theme = t.id; applyAll(); buildChips(); };
    tc.appendChild(c);
  });
}

// ===== 全装飾を適用 =====
function applyAll() {
  const page = document.getElementById('page');
  themes.forEach(t => page.classList.remove(t.id));
  page.classList.add(state.theme);
  skins.filter(Boolean).forEach(s => page.classList.remove(s));
  if (state.skin) page.classList.add(state.skin);
  const title = page.querySelector('.title-area');
  titleVars.forEach(v => title.classList.remove(v));
  title.classList.add(state.titleVar);
  const comm = document.getElementById('commentArea');
  commVars.filter(Boolean).forEach(v => comm.classList.remove(v));
  if (state.commVar) comm.classList.add(state.commVar);
  const area = document.getElementById('photoArea');
  patterns.forEach(p => area.classList.remove(p.id));
  area.classList.add(state.pattern);
  area.dataset.count = state.photos.length || 4;
}

// ===== デザイン全変更 =====
function shuffleDesign() {
  // パターンを順次切替
  const pList = patterns.map(p => p.id);
  let np;
  do { np = pick(pList); } while (np === state.pattern && pList.length > 1);
  state.pattern = np;

  let nt;
  do { nt = pick(themes).id; } while (nt === state.theme && themes.length > 1);
  state.theme = nt;

  state.skin = pick(skins);
  state.titleVar = pick(titleVars);
  state.commVar = pick(commVars);

  buildChips();
  applyAll();
}

// ===== 写真描画 =====
function renderPhotos() {
  const area = document.getElementById('photoArea');
  const telopEls = Array.from(area.querySelectorAll('.telop'));
  area.innerHTML = '';
  const count = state.photos.length;
  if (count === 0) {
    for (let i = 0; i < 4; i++) {
      const cell = document.createElement('div');
      cell.className = 'photo-cell';
      cell.innerHTML = '<div class="placeholder">📷<br>写真を選択してください</div>';
      area.appendChild(cell);
    }
  } else {
    state.photos.forEach((src, i) => {
      const cell = document.createElement('div');
      const crop = state.cellCrops[i] || 'center center';
      cell.className = 'photo-cell';
      cell.innerHTML = `<img src="${src}" alt="photo${i}" style="object-position:${crop}">`;
      cell.onclick = () => swapPhoto(i);
      area.appendChild(cell);
    });
  }
  telopEls.forEach(el => area.appendChild(el));
  applyAll();
}

let swapFirst = null;
function swapPhoto(i) {
  if (swapFirst === null) {
    swapFirst = i;
    document.querySelectorAll('.photo-cell')[i].style.outline = '3px solid #2a5d8f';
  } else {
    if (swapFirst !== i) {
      [state.photos[swapFirst], state.photos[i]] = [state.photos[i], state.photos[swapFirst]];
    }
    swapFirst = null;
    renderPhotos();
  }
}

// ===== 写真選択 =====
document.getElementById('photoInput').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files).slice(0, 4);
  if (files.length === 0) return;
  // まず読込
  const reads = files.map(f => new Promise(res => {
    const r = new FileReader();
    r.onload = ev => res(ev.target.result);
    r.readAsDataURL(f);
  }));
  state.photos = await Promise.all(reads);
  state.cellCrops = state.photos.map(() => 'center center');

  // 即座に表示（中央クロップ）
  renderPhotos();

  // 顔検出ステータス表示
  const hint = document.querySelector('.file-label').nextElementSibling;
  const original = hint.textContent;
  hint.textContent = '🤖 AIで顔位置を検出中...';

  // 顔検出（順次・並列）
  const crops = await Promise.all(state.photos.map(detectCrop));
  state.cellCrops = crops;
  hint.textContent = '✓ 顔位置を検出して切り抜き調整しました';
  setTimeout(() => hint.textContent = original, 4000);
  renderPhotos();
});

// ===== テロップ（SVGイラスト合成） =====
let lastTelopStyle = '';
function addTelop() {
  const userText = document.getElementById('telopText').value.trim();
  const text = userText || aiTelopText();
  let style;
  do { style = pick(telopStyles); } while (style === lastTelopStyle && telopStyles.length > 1);
  lastTelopStyle = style;
  const area = document.getElementById('photoArea');
  const season = getSeason();
  const el = document.createElement('div');
  el.className = 'telop ' + style;
  el.innerHTML = `
    <div class="deco">${svgDeco(style, season)}</div>
    <span class="txt">${escapeHtml(text)}</span>
    <button class="del" onclick="this.parentElement.remove()">×</button>`;
  // スタンプは既定で回転済み。その他は微小ランダム回転
  if (!['tel-stamp'].includes(style)) {
    const rot = (Math.random() * 6 - 3).toFixed(1);
    el.style.transform = `rotate(${rot}deg)`;
  }
  const rect = area.getBoundingClientRect();
  el.style.left = (20 + Math.random() * Math.max(60, rect.width - 260)) + 'px';
  el.style.top  = (20 + Math.random() * Math.max(60, rect.height - 100)) + 'px';
  makeDraggable(el);
  area.appendChild(el);
  document.getElementById('telopText').value = '';
}

function clearTelops() {
  document.querySelectorAll('.telop').forEach(t => t.remove());
}

function makeDraggable(el) {
  let sx, sy, ox, oy, drag = false;
  el.addEventListener('mousedown', e => {
    if (e.target.classList.contains('del')) return;
    drag = true;
    sx = e.clientX; sy = e.clientY;
    ox = el.offsetLeft; oy = el.offsetTop;
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!drag) return;
    el.style.left = (ox + e.clientX - sx) + 'px';
    el.style.top  = (oy + e.clientY - sy) + 'px';
  });
  document.addEventListener('mouseup', () => drag = false);
}

// ===== AIコメント生成 =====
function generateAI() {
  const text = generateAIComment();
  document.getElementById('commentText').value = text;
  document.getElementById('commentArea').textContent = text;
}

// ===== バインド =====
function bindEvents() {
  document.getElementById('commentText').addEventListener('input', e => {
    document.getElementById('commentArea').textContent = e.target.value || ' ';
  });
  document.getElementById('startDate').addEventListener('input', updateMeta);
  document.getElementById('endDate').addEventListener('input', updateMeta);
}

function formatDateRange(startStr, endStr) {
  if (!startStr) return '　　　　';
  const s = new Date(startStr);
  const sY = s.getFullYear(), sM = s.getMonth() + 1, sD = s.getDate();
  if (!endStr) return `${sY}年${sM}月${sD}日`;
  const e = new Date(endStr);
  const eY = e.getFullYear(), eM = e.getMonth() + 1, eD = e.getDate();
  if (s.getTime() === e.getTime()) return `${sY}年${sM}月${sD}日`;
  if (sY === eY && sM === eM) return `${sY}年${sM}月${sD}日〜${eD}日`;
  if (sY === eY) return `${sY}年${sM}月${sD}日〜${eM}月${eD}日`;
  return `${sY}年${sM}月${sD}日〜${eY}年${eM}月${eD}日`;
}

function updateMeta() {
  document.getElementById('metaDate').textContent =
    formatDateRange(document.getElementById('startDate').value,
                    document.getElementById('endDate').value);
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

init();
