<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>元気の家ショートステイ 報告書作成</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Shippori+Mincho+B1:wght@700;800&family=Noto+Serif+JP:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@500;700;900&family=Zen+Old+Mincho:wght@700;900&family=Sawarabi+Mincho&family=Klee+One:wght@400;600&family=Zen+Kurenaido&family=Cormorant+Garamond:wght@400;600;700&family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
<script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.13/dist/face-api.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Yu Gothic UI", "Meiryo", sans-serif; background: #eef1f5; color: #333; }

  /* ===== レイアウト ===== */
  .app { display: grid; grid-template-columns: 320px 1fr; min-height: 100vh; }
  .panel { background: #fff; border-right: 1px solid #ddd; padding: 16px; overflow-y: auto; max-height: 100vh; }
  .stage { padding: 24px; display: flex; justify-content: center; align-items: flex-start; }

  /* ===== サイドパネル ===== */
  h1 { font-size: 16px; margin-bottom: 12px; color: #2a5d8f; }
  h2 { font-size: 13px; margin: 14px 0 6px; color: #555; border-left: 4px solid #2a5d8f; padding-left: 6px; }
  .group { margin-bottom: 14px; }
  button, .btn {
    background: #2a5d8f; color: #fff; border: none; padding: 8px 12px;
    border-radius: 6px; cursor: pointer; font-size: 12px; margin: 2px;
    transition: background .15s;
  }
  button:hover { background: #3b7ab8; }
  button.sub { background: #ddd; color: #333; }
  button.sub:hover { background: #ccc; }
  button.warn { background: #c0392b; }
  .chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .chip { padding: 6px 10px; background: #f0f3f7; border: 1px solid #d0d7e0; border-radius: 14px; cursor: pointer; font-size: 12px; }
  .chip.active { background: #2a5d8f; color: #fff; border-color: #2a5d8f; }
  textarea, input[type="text"] {
    width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px;
    font-family: inherit; font-size: 12px; resize: vertical;
  }
  textarea { min-height: 60px; }
  label { font-size: 11px; color: #666; display: block; margin-bottom: 2px; }
  .file-input { display: none; }
  .file-label {
    display: inline-block; background: #27ae60; color: #fff;
    padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  .file-label:hover { background: #2ecc71; }
  .hint { font-size: 11px; color: #888; margin-top: 4px; }

  /* ===== A4用紙 ===== */
  .page {
    width: 210mm; min-height: 297mm; background: #fff;
    box-shadow: 0 10px 40px rgba(0,0,0,.18);
    padding: 14mm 14mm 12mm; position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .header {
    display: grid; grid-template-columns: 1fr auto;
    align-items: end; gap: 14px;
    padding-bottom: 12px; margin-bottom: 14px;
  }
  .title-area { text-align: left; }
  .title-area .main-title { font-size: 24px; font-weight: 700; line-height: 1.2; }
  .title-area .sub-title { font-size: 11.5px; opacity: .85; margin-top: 4px; letter-spacing: 3px; }
  .title-area .ornament { display: block; margin-top: 6px; line-height: 0; color: currentColor; }
  .title-area .ornament svg { color: inherit; }
  .meta { text-align: right; font-size: 10.5px; line-height: 1.9; letter-spacing: .5px; }
  .meta-label { display: inline-block; font-size: 9px; opacity: .7; margin-right: 4px; letter-spacing: 2px; }

  /* ===== 写真エリア ===== */
  .photo-area { flex: 1.2; display: grid; gap: 6px; position: relative; min-height: 130mm; }
  .photo-cell {
    position: relative; overflow: hidden; background: #f5f5f5;
    border-radius: 4px; display: flex; align-items: center; justify-content: center;
  }
  .photo-cell img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-cell .placeholder { color: #aaa; font-size: 14px; text-align: center; padding: 16px; }

  /* ===== レイアウト（3種） ===== */
  /* 四角パターン（グリッド） */
  .photo-area[data-count="3"].pat-square { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr; gap: 10px; }
  .photo-area[data-count="4"].pat-square { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 12px; }

  /* 円パターン（flex でセンタリング、大きめ円） */
  .pat-circle { display: flex !important; flex-wrap: wrap; gap: 14px;
    align-items: center; align-content: center; justify-content: center;
    padding: 4mm 6mm;
  }
  .pat-circle .photo-cell {
    flex: 0 0 auto; aspect-ratio: 1 / 1; border-radius: 50% !important;
    box-shadow: 0 8px 22px rgba(0,0,0,.18), 0 0 0 1px rgba(0,0,0,.04);
    border: 5px solid #fff; overflow: hidden;
  }
  .pat-circle .photo-cell img { border-radius: 50%; }
  .photo-area[data-count="3"].pat-circle .photo-cell { width: calc(33% - 12px); }
  .photo-area[data-count="4"].pat-circle .photo-cell { width: calc(50% - 14px); }

  /* 大小メリハリパターン */
  .photo-area[data-count="3"].pat-contrast { grid-template-columns: 2fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; }
  .photo-area[data-count="3"].pat-contrast .photo-cell:nth-child(1) { grid-row: span 2; }
  .photo-area[data-count="4"].pat-contrast { grid-template-columns: 2.2fr 1fr; grid-template-rows: 1fr 1fr 1fr; gap: 10px; }
  .photo-area[data-count="4"].pat-contrast .photo-cell:nth-child(1) { grid-row: span 3; }

  /* ===== デザインイラスト背景レイヤー ===== */
  .design-bg { position: absolute; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .design-bg svg { width: 100%; height: 100%; display: block; }
  .page > .header, .page > .photo-area, .page > .comment-area, .page > .footer { position: relative; z-index: 2; }

  /* ===== 写真の基本仕上げ（パターン共通・高品質） ===== */
  .pat-square .photo-cell, .pat-contrast .photo-cell {
    border-radius: 4px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 8px 24px -6px rgba(0,0,0,.2);
    border: 1px solid rgba(255,255,255,.6);
  }
  .pat-contrast .photo-cell:first-child {
    border-radius: 6px;
    box-shadow: 0 2px 6px rgba(0,0,0,.1), 0 14px 32px -8px rgba(0,0,0,.25);
  }
  .photo-cell { position: relative; }
  .photo-cell::after { content: ''; position: absolute; inset: 0;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,.04); pointer-events: none;
    border-radius: inherit;
  }

  /* ===== テロップ（SVGイラスト入り） ===== */
  .telop {
    position: absolute; cursor: move; user-select: none; z-index: 10;
    display: inline-block; transition: transform .1s;
  }
  .telop:hover { transform: scale(1.04) !important; }
  .telop .del {
    position: absolute; top: -10px; right: -10px; background: #e74c3c; color: #fff;
    width: 20px; height: 20px; border-radius: 50%; font-size: 11px; display: none;
    align-items: center; justify-content: center; cursor: pointer; border: 2px solid #fff;
    z-index: 20;
  }
  .telop:hover .del { display: flex; }
  .telop .deco { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
  .telop .deco svg { width: 100%; height: 100%; display: block; overflow: visible; }
  .telop .txt {
    position: relative; z-index: 1; padding: 16px 34px; font-weight: 700;
    font-size: 18px; white-space: nowrap; display: block;
  }

  /* ① 桜リボン（ピンクグラデ・キラメキ） */
  .tel-sakura .txt { color: #fff; font-family: "Noto Serif JP", serif;
    text-shadow: 0 1px 2px rgba(140,30,60,.6); padding: 14px 48px; letter-spacing: 2px; }

  /* ② ゴールドプレート（高級感） */
  .tel-gold .txt { color: #5a3d00; font-family: "Noto Serif JP", serif; font-weight: 900;
    text-shadow: 0 1px 0 rgba(255,255,255,.5); padding: 16px 42px; letter-spacing: 3px; }

  /* ③ コミック吹き出し */
  .tel-comic .txt { color: #111; font-family: "Mochiy Pop One", sans-serif;
    padding: 20px 38px 22px; font-size: 19px; }

  /* ④ 水彩ブラシ */
  .tel-watercolor .txt { color: #fff; font-family: "Klee One", serif; font-weight: 700;
    text-shadow: 0 2px 4px rgba(0,0,0,.25); padding: 18px 38px; letter-spacing: 1px; }

  /* ⑤ ヴィンテージスタンプ */
  .tel-stamp .txt { color: #9c1f1f; font-family: "Noto Serif JP", serif; font-weight: 900;
    padding: 18px 30px; letter-spacing: 4px; transform: rotate(-5deg);
    text-shadow: 0 0 1px #9c1f1f;
  }
  .tel-stamp { transform: rotate(-3deg); }

  /* ⑥ 手書きノート */
  .tel-note .txt { color: #2c3e50; font-family: "Zen Kurenaido", "Klee One", serif;
    padding: 16px 30px; font-size: 18px; font-weight: 600; }

  /* ⑦ ポップステッカー */
  .tel-pop .txt { color: #fff; font-family: "Mochiy Pop One", sans-serif;
    padding: 16px 36px; text-shadow: 2px 2px 0 rgba(0,0,0,.3); letter-spacing: 1px; }

  /* ⑧ 季節フラワー */
  .tel-flower .txt { color: #4a3b2a; font-family: "Sawarabi Mincho", serif; font-weight: 700;
    padding: 18px 52px; letter-spacing: 2px; }

  /* ===== コメント ===== */
  .comment-area {
    margin-top: 12px; padding: 16px 22px; border-radius: 8px;
    font-size: 13.5px; line-height: 1.95; min-height: 60px;
    letter-spacing: .8px;
  }

  /* ===== フッター ===== */
  .footer { margin-top: 10px; padding-top: 8px; font-size: 9.5px; opacity: .8;
    border-top: 1px solid currentColor; display: flex; justify-content: space-between;
    letter-spacing: 2px;
  }
  .footer .brand { font-weight: 700; }

  /* ===== プロデザイン10種（ブランディング品質） ===== */
  /* 共通: Cormorant Garamond で英語サブ装飾、Shippori Mincho で和タイトル */

  /* ① 桜雅 (Sakura Elegance) — 墨桜＋品位ある余白構成 */
  .dsg-sakura { background: #fffaf5; color: #3d1f2b; }
  .dsg-sakura .main-title { color: #8b2c4e; font-family: "Shippori Mincho B1", "Shippori Mincho", serif; font-weight: 800; letter-spacing: 8px; }
  .dsg-sakura .sub-title { color: #b85778; font-family: "Cormorant Garamond", serif; font-style: italic; letter-spacing: 4px; font-weight: 600; }
  .dsg-sakura .header { border-bottom: none; padding-bottom: 14px; }
  .dsg-sakura .meta { color: #6a2a40; font-family: "Cormorant Garamond", serif; font-weight: 500; }
  .dsg-sakura .meta-label { color: #b85778; }
  .dsg-sakura .comment-area { background: rgba(255,255,255,.7); border: none; box-shadow: inset 0 0 0 1px rgba(139,44,78,.2); color: #3d1f2b; font-family: "Shippori Mincho", serif; font-weight: 500; padding: 20px 26px; }
  .dsg-sakura .footer { color: #8b2c4e; border-top-color: rgba(139,44,78,.3); }

  /* ② 和モダン (Wa-Modern) — 墨×朱、極細罫線 */
  .dsg-wamodern { background: #f7f2e9; color: #1a1a1a; }
  .dsg-wamodern .main-title { color: #1a1a1a; font-family: "Zen Old Mincho", "Shippori Mincho", serif; font-weight: 900; letter-spacing: 10px; }
  .dsg-wamodern .sub-title { color: #9c1a1a; font-family: "Shippori Mincho", serif; letter-spacing: 6px; font-weight: 500; }
  .dsg-wamodern .header { border-bottom: none; padding-bottom: 14px; }
  .dsg-wamodern .meta { color: #1a1a1a; font-family: "Shippori Mincho", serif; }
  .dsg-wamodern .meta-label { color: #9c1a1a; font-family: "Cormorant Garamond", serif; }
  .dsg-wamodern .comment-area { background: transparent; border: none; border-top: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a; color: #1a1a1a; font-family: "Shippori Mincho", serif; font-weight: 500; border-radius: 0; padding: 18px 8px; }
  .dsg-wamodern .footer { color: #1a1a1a; border-top-color: #1a1a1a; }

  /* ③ 植物園 (Botanical Garden) — 深緑とクリーム */
  .dsg-botanical { background: #f5f7ee; color: #2c4024; }
  .dsg-botanical .main-title { color: #2c4024; font-family: "Shippori Mincho", serif; font-weight: 800; letter-spacing: 4px; }
  .dsg-botanical .sub-title { color: #5a7547; font-family: "Cormorant Garamond", serif; font-style: italic; letter-spacing: 3px; font-weight: 600; }
  .dsg-botanical .header { border-bottom: 1px solid rgba(44,64,36,.2); padding-bottom: 14px; }
  .dsg-botanical .meta { color: #2c4024; font-family: "Cormorant Garamond", serif; font-weight: 500; }
  .dsg-botanical .meta-label { color: #5a7547; }
  .dsg-botanical .comment-area { background: rgba(255,255,255,.55); border: none; box-shadow: 0 2px 12px rgba(44,64,36,.08); border-radius: 4px; color: #2c4024; font-family: "Shippori Mincho", serif; font-weight: 500; padding: 20px 26px; }
  .dsg-botanical .footer { color: #2c4024; border-top-color: rgba(44,64,36,.25); }

  /* ④ 金彩 (Gold Atelier) — 黒背景アイボリー金 */
  .dsg-gold { background: #fdfaf0; color: #2a2416; }
  .dsg-gold .main-title { color: #1a1406; font-family: "Shippori Mincho B1", serif; font-weight: 800; letter-spacing: 10px; }
  .dsg-gold .sub-title { color: #8a6816; font-family: "Cinzel", serif; letter-spacing: 6px; font-weight: 500; }
  .dsg-gold .header { border-bottom: none; padding-bottom: 14px; }
  .dsg-gold .meta { color: #1a1406; font-family: "Cinzel", serif; font-weight: 500; font-size: 10px; }
  .dsg-gold .meta-label { color: #8a6816; }
  .dsg-gold .comment-area { background: transparent; border: none; outline: 1px solid rgba(138,104,22,.5); outline-offset: -1px; box-shadow: inset 0 0 0 5px #fdfaf0, inset 0 0 0 6px rgba(138,104,22,.5); color: #1a1406; font-family: "Shippori Mincho", serif; font-weight: 500; padding: 22px 28px; border-radius: 0; }
  .dsg-gold .footer { color: #8a6816; border-top-color: rgba(138,104,22,.4); font-family: "Cinzel", serif; }

  /* ⑤ 水彩 (Watercolor Atelier) — 穏やかなパステル */
  .dsg-watercolor { background: #fefaf6; color: #4a2438; }
  .dsg-watercolor .main-title { color: #a03858; font-family: "Shippori Mincho", serif; font-weight: 700; letter-spacing: 6px; }
  .dsg-watercolor .sub-title { color: #7a4060; font-family: "Cormorant Garamond", serif; font-style: italic; letter-spacing: 4px; font-weight: 600; }
  .dsg-watercolor .header { border-bottom: none; padding-bottom: 14px; }
  .dsg-watercolor .meta { color: #7a4060; font-family: "Cormorant Garamond", serif; font-weight: 500; }
  .dsg-watercolor .meta-label { color: #a03858; }
  .dsg-watercolor .comment-area { background: rgba(255,255,255,.6); border: none; border-radius: 2px; box-shadow: 0 4px 18px rgba(160,56,88,.12); color: #4a2438; font-family: "Klee One", serif; font-weight: 400; padding: 20px 26px; }
  .dsg-watercolor .footer { color: #7a4060; border-top-color: rgba(122,64,96,.3); }

  /* ⑥ 古典 (Classical Frame) — 重厚なフレーム */
  .dsg-classical { background: #faf4e8; color: #2a1f0e; }
  .dsg-classical .main-title { color: #2a1f0e; font-family: "Shippori Mincho B1", serif; font-weight: 800; letter-spacing: 8px; }
  .dsg-classical .sub-title { color: #6b4a20; font-family: "Cormorant Garamond", serif; font-style: italic; letter-spacing: 5px; font-weight: 600; }
  .dsg-classical .header { border-bottom: none; padding-bottom: 14px; }
  .dsg-classical .meta { color: #2a1f0e; font-family: "Cormorant Garamond", serif; font-weight: 600; }
  .dsg-classical .meta-label { color: #6b4a20; }
  .dsg-classical .comment-area { background: transparent; border: none; border-top: 1px solid #6b4a20; border-bottom: 1px solid #6b4a20; color: #2a1f0e; font-family: "Shippori Mincho", serif; font-weight: 500; padding: 20px 8px; border-radius: 0; }
  .dsg-classical .footer { color: #2a1f0e; border-top-color: #6b4a20; font-family: "Cormorant Garamond", serif; }

  /* ⑦ 北欧 (Nordic Minimal) — ミニマル */
  .dsg-scandi { background: #f8f5f0; color: #2c3e36; }
  .dsg-scandi .main-title { color: #2c3e36; font-family: "Zen Kaku Gothic New", sans-serif; font-weight: 900; letter-spacing: 3px; }
  .dsg-scandi .sub-title { color: #c17a5f; font-family: "Cormorant Garamond", serif; font-style: italic; letter-spacing: 4px; font-weight: 500; }
  .dsg-scandi .header { border-bottom: 2px solid #2c3e36; padding-bottom: 14px; }
  .dsg-scandi .meta { color: #2c3e36; font-family: "Zen Kaku Gothic New", sans-serif; font-weight: 500; }
  .dsg-scandi .meta-label { color: #c17a5f; }
  .dsg-scandi .comment-area { background: rgba(255,255,255,.7); border: none; border-radius: 2px; color: #2c3e36; font-family: "Zen Kaku Gothic New", sans-serif; font-weight: 400; padding: 20px 26px; }
  .dsg-scandi .footer { color: #2c3e36; border-top-color: #2c3e36; font-family: "Zen Kaku Gothic New", sans-serif; }

  /* ⑧ 紅葉 (Autumn Maple) — 深いテラコッタ */
  .dsg-autumn { background: #fdf6ec; color: #4a2210; }
  .dsg-autumn .main-title { color: #7a2e10; font-family: "Shippori Mincho B1", serif; font-weight: 800; letter-spacing: 6px; }
  .dsg-autumn .sub-title { color: #b8682e; font-family: "Cormorant Garamond", serif; font-style: italic; letter-spacing: 4px; font-weight: 600; }
  .dsg-autumn .header { border-bottom: 1px solid rgba(122,46,16,.3); padding-bottom: 14px; }
  .dsg-autumn .meta { color: #7a2e10; font-family: "Cormorant Garamond", serif; font-weight: 500; }
  .dsg-autumn .meta-label { color: #b8682e; }
  .dsg-autumn .comment-area { background: rgba(255,255,255,.55); border: none; box-shadow: inset 0 0 0 1px rgba(122,46,16,.2); color: #4a2210; font-family: "Shippori Mincho", serif; font-weight: 500; padding: 20px 26px; }
  .dsg-autumn .footer { color: #7a2e10; border-top-color: rgba(122,46,16,.3); }

  /* ⑨ 冬 (Winter Serene) — 静謐な藍 */
  .dsg-winter { background: #f4f8fb; color: #19354a; }
  .dsg-winter .main-title { color: #19354a; font-family: "Shippori Mincho B1", serif; font-weight: 800; letter-spacing: 8px; }
  .dsg-winter .sub-title { color: #4a7595; font-family: "Cormorant Garamond", serif; font-style: italic; letter-spacing: 4px; font-weight: 600; }
  .dsg-winter .header { border-bottom: 1px solid rgba(25,53,74,.25); padding-bottom: 14px; }
  .dsg-winter .meta { color: #19354a; font-family: "Cormorant Garamond", serif; font-weight: 500; }
  .dsg-winter .meta-label { color: #4a7595; }
  .dsg-winter .comment-area { background: rgba(255,255,255,.65); border: none; border-radius: 2px; box-shadow: 0 2px 12px rgba(25,53,74,.08); color: #19354a; font-family: "Shippori Mincho", serif; font-weight: 500; padding: 20px 26px; }
  .dsg-winter .footer { color: #19354a; border-top-color: rgba(25,53,74,.25); }

  /* ⑩ 手描き (Atelier Hand) — 温かな手仕事感 */
  .dsg-handdrawn { background: #fdf9ed; color: #2e2410; }
  .dsg-handdrawn .main-title { color: #2e2410; font-family: "Klee One", serif; font-weight: 600; letter-spacing: 4px; }
  .dsg-handdrawn .sub-title { color: #8a6a3a; font-family: "Cormorant Garamond", serif; font-style: italic; letter-spacing: 3px; font-weight: 600; }
  .dsg-handdrawn .header { border-bottom: none; padding-bottom: 14px; }
  .dsg-handdrawn .meta { color: #2e2410; font-family: "Klee One", serif; }
  .dsg-handdrawn .meta-label { color: #8a6a3a; }
  .dsg-handdrawn .comment-area { background: rgba(255,252,235,.7); border: none; color: #2e2410; font-family: "Klee One", serif; font-weight: 400; padding: 20px 26px; border-radius: 2px; }
  .dsg-handdrawn .footer { color: #2e2410; border-top-color: rgba(46,36,16,.3); }

  /* ===== 印刷 ===== */
  @media print {
    body { background: #fff; }
    .panel { display: none; }
    .app { grid-template-columns: 1fr; }
    .stage { padding: 0; }
    .page { box-shadow: none; width: 210mm; min-height: 297mm;
      -webkit-print-color-adjust: exact; print-color-adjust: exact; color-adjust: exact;
    }
    .telop .del { display: none !important; }
    @page { size: A4; margin: 0; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- ====== 操作パネル ====== -->
  <aside class="panel">

function getSeason() {
  const m = new Date(document.getElementById('startDate').value || Date.now()).getMonth() + 1;
  if (m >= 3 && m <= 5) return 'spring';
  if (m >= 6 && m <= 8) return 'summer';
  if (m >= 9 && m <= 11) return 'autumn';
  return 'winter';
}

// ===== 顔検出（face-api.js tiny model） =====
let faceApiReady = false;
let faceApiLoading = null;
async function ensureFaceApi() {
  if (faceApiReady) return true;
  if (faceApiLoading) return faceApiLoading;
  faceApiLoading = (async () => {
    try {
      if (typeof faceapi === 'undefined') {
        // script defer でまだ読込中の場合
        await new Promise(r => setTimeout(r, 300));
      }
      const base = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.13/model';
      await faceapi.nets.tinyFaceDetector.loadFromUri(base);
      faceApiReady = true;
      return true;
    } catch (e) {
      console.warn('face-api load failed:', e);
      return false;
    }
  })();
  return faceApiLoading;
}

async function detectCrop(dataUrl) {
  try {
    const ok = await ensureFaceApi();
    if (!ok) return 'center center';
    const img = await new Promise((res, rej) => {
      const i = new Image();
      i.onload = () => res(i);
      i.onerror = rej;
      i.src = dataUrl;
    });
    const dets = await faceapi.detectAllFaces(img,
      new faceapi.TinyFaceDetectorOptions({ inputSize: 416, scoreThreshold: 0.4 }));
    if (!dets || dets.length === 0) return 'center center';
    // 全顔の重心
    let minX = Infinity, minY = Infinity, maxX = 0, maxY = 0;
    dets.forEach(d => {
      const b = d.box;
      minX = Math.min(minX, b.x); minY = Math.min(minY, b.y);
      maxX = Math.max(maxX, b.x + b.width); maxY = Math.max(maxY, b.y + b.height);
    });
    const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
    // 画像内の%に変換（0〜100でクランプ）
    const px = Math.max(0, Math.min(100, (cx / img.width) * 100));
    const py = Math.max(0, Math.min(100, (cy / img.height) * 100));
    return `${px.toFixed(1)}% ${py.toFixed(1)}%`;
  } catch (e) {
    console.warn('detectCrop error:', e);
    return 'center center';
  }
}

// ===== 初期化 =====
function init() {
  // 初期デザイン（季節推奨）
  state.design = pickInitialDesign();

  // 日付デフォルト（本日）
  const today = new Date();
  const iso = today.toISOString().slice(0, 10);
  document.getElementById('startDate').value = iso;

  buildChips();
  renderPhotos();
  applyAll();
  bindEvents();
  updateMeta();

  // face-api のモデルをバックグラウンド先読み
  ensureFaceApi();
}

// ===== チップ生成 =====
function buildChips() {
  const pc = document.getElementById('patternChips');
  pc.innerHTML = '';
  patterns.forEach(p => {
    const c = document.createElement('div');
    c.className = 'chip' + (state.pattern === p.id ? ' active' : '');
    c.textContent = p.name;
    c.onclick = () => { state.pattern = p.id; applyAll(); buildChips(); };
    pc.appendChild(c);
  });
}

// ===== 全装飾を適用 =====
function applyAll() {
  const page = document.getElementById('page');
  designs.forEach(d => page.classList.remove(d.id));
  page.classList.add(state.design);
  document.getElementById('designBg').innerHTML = designBackground(state.design);
  const ornEl = document.getElementById('ornament');
  if (ornEl) ornEl.innerHTML = ornamentSVG(state.design);
  const dsg = designs.find(d => d.id === state.design);
  const nm = document.getElementById('designName');
  if (nm && dsg) nm.textContent = '現在: ' + dsg.name;
  const area = document.getElementById('photoArea');
  patterns.forEach(p => area.classList.remove(p.id));
  area.classList.add(state.pattern);
  area.dataset.count = state.photos.length || 4;
}

// ===== デザイン全変更 =====
function shuffleDesign() {
  // 写真パターンも毎回切替
  const pList = patterns.map(p => p.id);
  let np;
  do { np = pick(pList); } while (np === state.pattern && pList.length > 1);
  state.pattern = np;
  // デザイン10種を循環
  let nd;
  do { nd = pick(designs).id; } while (nd === state.design && designs.length > 1);
  state.design = nd;

  buildChips();
  applyAll();
}

// ===== 初期デザイン選定（季節に合う推奨） =====
function pickInitialDesign() {
  const month = new Date().getMonth() + 1;
  const matched = designs.filter(d => d.seasons.includes(month));
  if (matched.length > 0) return pick(matched).id;
  return pick(designs).id;
}

// ===== 写真描画 =====
function renderPhotos() {
  const area = document.getElementById('photoArea');
  const telopEls = Array.from(area.querySelectorAll('.telop'));
  area.innerHTML = '';
  const count = state.photos.length;
  if (count === 0) {
    for (let i = 0; i < 4; i++) {
      const cell = document.createElement('div');
      cell.className = 'photo-cell';
      cell.innerHTML = '<div class="placeholder">📷<br>写真を選択してください</div>';
      area.appendChild(cell);
    }
  } else {
    state.photos.forEach((src, i) => {
      const cell = document.createElement('div');
      const crop = state.cellCrops[i] || 'center center';
      cell.className = 'photo-cell';
      cell.innerHTML = `<img src="${src}" alt="photo${i}" style="object-position:${crop}">`;
      cell.onclick = () => swapPhoto(i);
      area.appendChild(cell);
    });
  }
  telopEls.forEach(el => area.appendChild(el));
  applyAll();
}

let swapFirst = null;
function swapPhoto(i) {
  if (swapFirst === null) {
    swapFirst = i;
    document.querySelectorAll('.photo-cell')[i].style.outline = '3px solid #2a5d8f';
  } else {
    if (swapFirst !== i) {
      [state.photos[swapFirst], state.photos[i]] = [state.photos[i], state.photos[swapFirst]];
    }
    swapFirst = null;
    renderPhotos();
  }
}

// ===== 写真選択 =====
document.getElementById('photoInput').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files).slice(0, 4);
  if (files.length === 0) return;
  // まず読込
  const reads = files.map(f => new Promise(res => {
    const r = new FileReader();
    r.onload = ev => res(ev.target.result);
    r.readAsDataURL(f);
  }));
  state.photos = await Promise.all(reads);
  state.cellCrops = state.photos.map(() => 'center center');

  // 即座に表示（中央クロップ）
  renderPhotos();

  // 顔検出ステータス表示
  const hint = document.querySelector('.file-label').nextElementSibling;
  const original = hint.textContent;
  hint.textContent = '🤖 AIで顔位置を検出中...';

  // 顔検出（順次・並列）
  const crops = await Promise.all(state.photos.map(detectCrop));
  state.cellCrops = crops;
  hint.textContent = '✓ 顔位置を検出して切り抜き調整しました';
  setTimeout(() => hint.textContent = original, 4000);
  renderPhotos();
});

// ===== テロップ（SVGイラスト合成） =====
let lastTelopStyle = '';
function addTelop() {
  const userText = document.getElementById('telopText').value.trim();
  const text = userText || aiTelopText();
  let style;
  do { style = pick(telopStyles); } while (style === lastTelopStyle && telopStyles.length > 1);
  lastTelopStyle = style;
  const area = document.getElementById('photoArea');
  const season = getSeason();
  const el = document.createElement('div');
  el.className = 'telop ' + style;
  el.innerHTML = `
    <div class="deco">${svgDeco(style, season)}</div>
    <span class="txt">${escapeHtml(text)}</span>
    <button class="del" onclick="this.parentElement.remove()">×</button>`;
  // スタンプは既定で回転済み。その他は微小ランダム回転
  if (!['tel-stamp'].includes(style)) {
    const rot = (Math.random() * 6 - 3).toFixed(1);
    el.style.transform = `rotate(${rot}deg)`;
  }
  const rect = area.getBoundingClientRect();
  el.style.left = (20 + Math.random() * Math.max(60, rect.width - 260)) + 'px';
  el.style.top  = (20 + Math.random() * Math.max(60, rect.height - 100)) + 'px';
  makeDraggable(el);
  area.appendChild(el);
  document.getElementById('telopText').value = '';
}

function clearTelops() {
  document.querySelectorAll('.telop').forEach(t => t.remove());
}

function makeDraggable(el) {
  let sx, sy, ox, oy, drag = false;
  el.addEventListener('mousedown', e => {
    if (e.target.classList.contains('del')) return;
    drag = true;
    sx = e.clientX; sy = e.clientY;
    ox = el.offsetLeft; oy = el.offsetTop;
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!drag) return;
    el.style.left = (ox + e.clientX - sx) + 'px';
    el.style.top  = (oy + e.clientY - sy) + 'px';
  });
  document.addEventListener('mouseup', () => drag = false);
}

// ===== AIコメント生成 =====
function generateAI() {
  const text = generateAIComment();
  document.getElementById('commentText').value = text;
  document.getElementById('commentArea').textContent = text;
}

// ===== バインド =====
function bindEvents() {
  document.getElementById('commentText').addEventListener('input', e => {
    document.getElementById('commentArea').textContent = e.target.value || ' ';
  });
  document.getElementById('startDate').addEventListener('input', updateMeta);
  document.getElementById('endDate').addEventListener('input', updateMeta);
}

function formatDateRange(startStr, endStr) {
  if (!startStr) return '　　　　';
  const s = new Date(startStr);
  const sY = s.getFullYear(), sM = s.getMonth() + 1, sD = s.getDate();
  if (!endStr) return `${sY}年${sM}月${sD}日`;
  const e = new Date(endStr);
  const eY = e.getFullYear(), eM = e.getMonth() + 1, eD = e.getDate();
  if (s.getTime() === e.getTime()) return `${sY}年${sM}月${sD}日`;
  if (sY === eY && sM === eM) return `${sY}年${sM}月${sD}日〜${eD}日`;
  if (sY === eY) return `${sY}年${sM}月${sD}日〜${eM}月${eD}日`;
  return `${sY}年${sM}月${sD}日〜${eY}年${eM}月${eD}日`;
}

function updateMeta() {
  document.getElementById('metaDate').textContent =
    formatDateRange(document.getElementById('startDate').value,
                    document.getElementById('endDate').value);
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

init();
</script>
